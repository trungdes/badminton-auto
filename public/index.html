<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp Xếp Sân Cầu Lông</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏸</text></svg>">
</head>
<body>
    <div class="header">
        <h1>🏸 Hệ Thống Sắp Xếp Sân Cầu Lông</h1>
        <button class="btn-action" id="btnNextRound">Xếp Hiệp Tiếp Theo</button>
        <button class="btn-action" id="btnReset">Reset</button>
        <button class="btn-action" id="btnRandom">Tạo Ngẫu Nhiên</button>
        <button class="btn-action" id="btnLogout">Logout</button>
    </div>

    <div class="add-player-form">
        <input type="text" id="inputName" placeholder="Tên người chơi" />
        <select id="selectLevel">
            <option value="" disabled selected>Chọn level</option>
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
        </select>
        <button class="btn-action" id="btnAddPlayer">Thêm</button>
    </div>

    <h2 class="section-title">Danh Sách Người Chơi</h2>
    <ul id="playerList"></ul>

    <h2 class="section-title">Lịch Sử Các Hiệp</h2>
    <div id="matchHistory"></div>

    <script src="script.js"></script>
</body>
</html>
