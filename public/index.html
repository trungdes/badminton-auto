<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp Xếp Sân Cầu Lông</title>
    <style>
        /* CSS để tạo giao diện chuyên nghiệp */
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-action {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { background-color: #219150; }

        .match-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .court-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .court {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            background: #fff;
        }

        .court h3 {
            margin-top: 0;
            color: var(--secondary);
            border-bottom: 2px solid var(--secondary);
            display: inline-block;
        }

        .player-list {
            list-style: none;
            padding: 0;
        }

        .player-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .level-badge {
            font-size: 0.8em;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏸 Hệ Thống Sắp Xếp Sân Cầu Lông</h1>
        <button class="btn-action" id="btnNextRound">Xếp Hiệp Tiếp Theo</button>
    </div>

    <div id="playerList"></div>

    <div id="matchHistory"></div>
    
    <script>
        
        const arrangeBtn = document.getElementById('btnNextRound')
        const matchHistoryBox = document.getElementById('matchHistory')
        const playerHistoryBox = document.getElementById('playerList')

        function renderPlayer(player) {
            return `
                <li class="player-item">
                    <span>${player.name}</span>
                    <span class="level-badge">Level ${player.level} | Set ${player.playedCount}</span>
                </li>
            `
}

        function renderPlayerList(players){
            return `
                <li class="player-item">
                    <span>${players.name}</span>
                    <span class="level-badge">${players.level}</span>
                    <span class="level-badge">${players.playedCount}</span>
                </li>
            `
        }

        function renderCourt(courtName, players){
            const playersHTML = players.map(renderPlayer).join('')
            return `<div class="court">
                        <h3>${courtName}</h3>
                        <ul class="player-list">${playersHTML}</ul>
                    </div>`
        }

        function renderMatch(match){
            return `<div class="match-card">
                        <h2>Hiệp: ${match.set}</h2>
                        <div class="court-container">
                            ${renderCourt('Sân 1', match.court_1)}
                            ${renderCourt('Sân 2', match.court_2)}
                        </div>
                    </div>`
        }

        function renderMatchHistory(matchHistory){
            matchHistoryBox.innerHTML = matchHistory.map(renderMatch).join('')
        }

        function renderPlayerHistory(players){
            playerHistoryBox.innerHTML = players.map(renderPlayerList).join('')
        }

        arrangeBtn.addEventListener('click', () => {
            fetch('/match-history')
                .then(Response => {
                    return Response.json()
                })
                .then(data => {
                    // console.log(data)
                    // console.log(data.matchHistory)
                    // console.log(data.players)
                    renderMatchHistory(data.matchHistory)
                    renderPlayerHistory(data.players)
                })
        });
    </script>
</body>
</html>
