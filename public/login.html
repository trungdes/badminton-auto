<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — Sắp Xếp Sân Cầu Lông</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1 class="login-logo">🏸</h1>
        <h2 class="login-title">Hệ Thống Sắp Xếp Sân Cầu Lông</h2>
        <p class="login-subtitle">Đăng nhập để quản lý người chơi của bạn</p>

        <form class="login-form">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                    placeholder="Nhập username" required>
            </div>

            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                    placeholder="Nhập password" required>
            </div>

            <button id="submit" type="submit" class="btn-action btn-login">Đăng Nhập</button>
            <p class="login-subtitle">chưa có tài khoản ? <a href="/register.html">Đăng kí</a></p>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
